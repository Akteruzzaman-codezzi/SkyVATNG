<p>User List!</p>

<button (click)="loadUsers()" class="btn btn-success my-3">Load Users</button>

@if (state$ | async; as state) {
  @if (state.loading) {
    <div class="alert alert-info py-2">
      Loading...
    </div>
  }

  @if (state.error) {
    <div class="alert alert-danger py-2">
      {{ state.error }}
    </div>
  }
}

<div style="height: 600px;" class="mt-3">
  <ag-grid-angular
    style="width: 100%; height: 100%;"
    [rowData]="users$ | async"
    [columnDefs]="columnDefs">
  </ag-grid-angular>
</div>
